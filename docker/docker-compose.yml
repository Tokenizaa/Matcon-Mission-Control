services:
  # ==========================================
  # Chatwoot (Rails + Sidekiq)
  # ==========================================
  matcon-rails:
    image: ghcr.io/fazer-ai/chatwoot:v4.12.0-fazer-ai.54
    container_name: matcon-chatwoot-rails
    restart: always
    depends_on:
      matcon-postgres:
        condition: service_healthy
      matcon-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      DEFAULT_LOCALE: pt_BR
      FRONTEND_URL: ${MATCON_FRONTEND_URL:-http://localhost:3001}
      INTERNAL_HOST_URL: http://matcon-rails:3000
      POSTGRES_HOST: matcon-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${MATCON_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MATCON_POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${MATCON_POSTGRES_DB}
      SECRET_KEY_BASE: ${MATCON_SECRET_KEY_BASE}
      REDIS_URL: redis://matcon-redis:6379
      REDIS_PASSWORD: ${MATCON_REDIS_PASSWORD}
      BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME: ${MATCON_BAILEYS_CLIENT_NAME}
      BAILEYS_PROVIDER_DEFAULT_URL: http://matcon-baileys-api:3025
      BAILEYS_PROVIDER_DEFAULT_API_KEY: ${MATCON_BAILEYS_API_KEY}
      BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL: 'true'
    volumes:
      - matcon_storage:/app/storage
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Accept: text/html' http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  matcon-sidekiq:
    image: ghcr.io/fazer-ai/chatwoot:v4.12.0-fazer-ai.54
    container_name: matcon-chatwoot-sidekiq
    restart: always
    depends_on:
      matcon-postgres:
        condition: service_healthy
      matcon-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      DEFAULT_LOCALE: pt_BR
      FRONTEND_URL: ${MATCON_FRONTEND_URL:-http://localhost:3001}
      INTERNAL_HOST_URL: http://matcon-rails:3000
      POSTGRES_HOST: matcon-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${MATCON_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MATCON_POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${MATCON_POSTGRES_DB}
      SECRET_KEY_BASE: ${MATCON_SECRET_KEY_BASE}
      REDIS_URL: redis://matcon-redis:6379
      REDIS_PASSWORD: ${MATCON_REDIS_PASSWORD}
      BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME: ${MATCON_BAILEYS_CLIENT_NAME}
      BAILEYS_PROVIDER_DEFAULT_URL: http://matcon-baileys-api:3025
      BAILEYS_PROVIDER_DEFAULT_API_KEY: ${MATCON_BAILEYS_API_KEY}
      BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL: 'true'
    volumes:
      - matcon_storage:/app/storage
    command: bundle exec sidekiq -C config/sidekiq.yml
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep [s]idekiq"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  # ==========================================
  # Baileys API (WhatsApp)
  # ==========================================
  matcon-baileys-api:
    image: ghcr.io/fazer-ai/baileys-api:latest
    container_name: matcon-baileys-api
    restart: always
    depends_on:
      matcon-redis:
        condition: service_healthy
    volumes:
      - matcon_storage:/app/storage
    environment:
      NODE_ENV: production
      REDIS_URL: redis://matcon-redis:6379
      REDIS_PASSWORD: ${MATCON_REDIS_PASSWORD}
      LOG_LEVEL: ${MATCON_LOG_LEVEL:-info}
      BAILEYS_LOG_LEVEL: ${MATCON_BAILEYS_LOG_LEVEL:-error}
      BAILEYS_PROVIDER_DEFAULT_API_KEY: ${MATCON_BAILEYS_API_KEY}
    command: >
      sh -c "bun manage-api-keys create user ${MATCON_BAILEYS_API_KEY} && bun start"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3025/status"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  # ==========================================
  # n8n - Automação
  # ==========================================
  matcon-n8n:
    image: n8nio/n8n:latest
    container_name: matcon-n8n
    restart: always
    depends_on:
      matcon-postgres-n8n:
        condition: service_healthy
      matcon-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      N8N_PORT: 5678
      N8N_HOST: ${MATCON_N8N_HOST:-localhost}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: matcon-postgres-n8n
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: matcon_n8n_user
      DB_POSTGRESDB_PASSWORD: ${MATCON_N8N_POSTGRES_PASSWORD}
      DB_POSTGRESDB_DATABASE: matcon_n8n
      N8N_EDITOR_BASE_URL: ${MATCON_N8N_URL:-http://localhost:5679}
      WEBHOOK_URL: ${MATCON_N8N_URL:-http://localhost:5679}
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_ENCRYPTION_KEY: ${MATCON_N8N_ENCRYPTION_KEY}
    ports:
      - "5679:5678"
    volumes:
      - matcon_n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  # ==========================================
  # Banco de Dados e Cache (Exclusivos Matcon)
  # ==========================================
  matcon-postgres:
    image: pgvector/pgvector:pg16
    container_name: matcon-chatwoot-postgres
    restart: always
    volumes:
      - matcon_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${MATCON_POSTGRES_DB}
      POSTGRES_USER: ${MATCON_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MATCON_POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  matcon-postgres-n8n:
    image: postgres:16-alpine
    container_name: matcon-n8n-postgres
    restart: always
    volumes:
      - matcon_postgres_n8n_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: matcon_n8n
      POSTGRES_USER: matcon_n8n_user
      POSTGRES_PASSWORD: ${MATCON_N8N_POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U matcon_n8n_user -d matcon_n8n"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  matcon-redis:
    image: redis:alpine
    container_name: matcon-redis
    restart: always
    command: redis-server --requirepass "${MATCON_REDIS_PASSWORD}"
    volumes:
      - matcon_redis_data:/data
    environment:
      REDIS_PASSWORD: ${MATCON_REDIS_PASSWORD}
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 -a $${MATCON_REDIS_PASSWORD} ping"]
      interval: 20s
      timeout: 20s
      retries: 10
    networks:
      - matcon-network

  # ==========================================
  # Supabase Local (Postgres simplificado)
  # ==========================================
  supabase-db:
    image: supabase/postgres:15.1.0.147
    container_name: supabase-db
    restart: always
    volumes:
      - supabase_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matcon-network

volumes:
  matcon_storage:
  matcon_postgres_data:
  matcon_postgres_n8n_data:
  matcon_redis_data:
  matcon_n8n_data:
  supabase_postgres_data:

networks:
  matcon-network:
    driver: bridge
