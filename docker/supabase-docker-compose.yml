version: '3.8'

services:
  # ==========================================
  # Supabase Database
  # ==========================================
  db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db
    restart: always
    environment:
      POSTGRES_PASSWORD: matcon_supabase_postgres_secure_2026
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase Studio
  # ==========================================
  studio:
    image: supabase/studio:20240401-5d33287
    container_name: supabase-studio
    restart: always
    depends_on:
      - db
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase API Gateway (Kong)
  # ==========================================
  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    restart: always
    depends_on:
      - db
      - postgrest
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
    volumes:
      - ./supabase/config/kong.yml:/home/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase PostgREST (REST API)
  # ==========================================
  postgrest:
    image: postgrest/postgrest:v12.0.1
    container_name: supabase-postgrest
    restart: always
    depends_on:
      - db
    environment:
      PGRST_DB_URI: postgres://postgres:matcon_supabase_postgres_secure_2026@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: matcon_supabase_jwt_secret_key_change_me_please_generate_new
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase Auth
  # ==========================================
  auth:
    image: supabase/gotrue:v2.143.0
    container_name: supabase-auth
    restart: always
    depends_on:
      - db
      - kong
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:matcon_supabase_postgres_secure_2026@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: matcon_supabase_jwt_secret_key_change_me_please_generate_new
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase Realtime
  # ==========================================
  realtime:
    image: supabase/realtime:v2.28.0
    container_name: supabase-realtime
    restart: always
    depends_on:
      - db
      - kong
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: matcon_supabase_postgres_secure_2026
      DB_NAME: postgres
      SLOT_NAME: supabase_realtime
      SECRET_KEY_BASE: matcon_supabase_jwt_secret_key_change_me_please_generate_new
      API_JWT_SECRET: matcon_supabase_jwt_secret_key_change_me_please_generate_new
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase Storage
  # ==========================================
  storage:
    image: supabase/storage-api:v0.45.4
    container_name: supabase-storage
    restart: always
    depends_on:
      - db
      - kong
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      POSTGRES_URL: postgres://postgres:matcon_supabase_postgres_secure_2026@db:5432/postgres
      DATABASE_URL: postgres://postgres:matcon_supabase_postgres_secure_2026@db:5432/postgres
      REGION: us-east-1
      GLOBAL_S3_BUCKET: supabase-storage
      ENABLE_IMAGE_TRANSFORMATION: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
    volumes:
      - supabase_storage_data:/var/lib/storage
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Supabase Functions (Edge Runtime)
  # ==========================================
  functions:
    image: supabase/edge-runtime:v1.45.0
    container_name: supabase-functions
    restart: always
    depends_on:
      - db
      - kong
    environment:
      JWT_SECRET: matcon_supabase_jwt_secret_key_change_me_please_generate_new
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  supabase_db_data:
  supabase_storage_data:

networks:
  default:
    name: supabase-network
